on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC

name: CI
jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4

      - name: Generate overrides to use current branch if PR
        id: gen-overrides
        if: github.event_name == 'pull_request'
        run: |
          pdm run tools/gen_overrides.py ${{github.head_ref}} > overrides.txt
          if [ -s overrides.txt ]; then
            echo "Generated overrides:"
            cat overrides.txt
            echo "overrides_generated=1" >> "$GITHUB_OUTPUT"
            echo "** Using overrides for $GITHUB_JOB **" > override.msg
            cat overrides.txt >> override.msg
          else
            echo "overrides_generated=2" >> "$GITHUB_OUTPUT"
          fi

      - name: Message overrides
        if: github.event_name == 'pull_request' && ${{ steps.gen-overrides.overrides_generated }}
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path:  './override.msg'
          comment-tag: ${{github.job}}-override
          create-if-not-exists: true

      - name: Relock PDM
        if: github.event_name != 'pull_request'
        run: pdm lock -d

      - name: Relock PDM (PR)
        if: github.event_name == 'pull_request'
        run: pdm lock -d --override overrides.txt

      - name: Install dependencies
        run: |
          pdm install
      - name: Run tests
        run: |
          pdm run test
      - name: Run lints
        run: |
          pdm run lint
      - name: Run doc tests
        run: pdm run test-docs

  license:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check source code licenses
        run: ./tools/license_check.sh

  test-submit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dry: [true, false]
    env:
      DRY: ${{ matrix.dry && '--dry-run' || '' }}
      IS_DRY: ${{ matrix.dry && '(dry run)' || '' }}
    name:  ${{ matrix.dry && 'Test Submit - Dry run' || 'Test submit' }}

    steps:
      - name: Check out chipflow-examples
        uses: actions/checkout@v4
        with:
          repository: ChipFlow/chipflow-examples
          fetch-depth: 0
          path: chipflow-examples
          ref: ${{ github.head_ref || 'refs/heads/main' }}

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.10'
          cache: true
          cache-dependency-path: './**/pyproject.toml'

      - name: Generate overrides to use current branch if PR
        id: gen-overrides
        working-directory: ./chipflow-examples
        if: github.event_name == 'pull_request'
        run: |
          pdm run tools/gen_overrides.py ${{github.head_ref}} > overrides.txt
          if [ -s overrides.txt ]; then
            echo "Generated overrides:"
            cat overrides.txt
            echo "overrides_generated=1" >> "$GITHUB_OUTPUT"
            echo "** Using overrides for $GITHUB_JOB **" > override.msg
            cat overrides.txt >> override.msg
          else
            echo "overrides_generated=2" >> "$GITHUB_OUTPUT"
          fi

      - name: Message overrides
        if: github.event_name == 'pull_request' && ${{ steps.gen-overrides.overrides_generated }}
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path:  './chipflow-examples/override.msg'
          comment-tag: ${{github.job}}-override
          create-if-not-exists: true

      - name: Relock PDM
        working-directory: ./chipflow-examples
        if: github.event_name != 'pull_request'
        run: pdm lock -d

      - name: Relock PDM (PR)
        working-directory: ./chipflow-examples
        if: github.event_name == 'pull_request'
        run: pdm lock -d --override overrides.txt

      - name: Install dependencies
        working-directory: ./chipflow-examples
        run: |
          pdm install

      - name: Run tests
        working-directory: ./chipflow-examples
        run: |
          pdm test

      - name: Submit build ${{ env.is_dry }}
        working-directory: ./chipflow-examples/minimal
        run: |
          pdm run chipflow pin lock
          pdm run chipflow silicon submit --wait $DRY
        env:
          CHIPFLOW_API_KEY: ${{ secrets.CHIPFLOW_API_KEY}}
